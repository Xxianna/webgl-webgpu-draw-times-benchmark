<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 1: Three.js 彩色三角面片（每个三角形独立Mesh）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #controls label {
            display: block;
            margin-bottom: 5px;
        }
        #controls input {
            width: 150px;
            padding: 5px;
            margin-bottom: 10px;
        }
        #controls button {
            padding: 5px 15px;
            cursor: pointer;
        }
        #fps-display {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="controls">
        <label for="triangle-count">三角面片数量:</label>
        <input type="number" id="triangle-count" value="100" min="1" max="10000000000000000000000000">
        <button id="apply-btn">应用</button>
        <div id="fps-display">FPS: 0</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./three/three.module.js",
            "three/addons/": "./three/addons/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 自定义ShaderMaterial - 每个三角形独立使用
        const createTriangleMaterial = () => new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 }
            },
            vertexShader: `
                attribute vec3 color;
                varying vec3 vColor;
                
                void main() {
                    vColor = color;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    gl_FragColor = vec4(vColor, 1.0);
                }
            `,
            side: THREE.DoubleSide,  // 双面渲染
            depthWrite: true
        });

        // 存储所有独立的三角形Mesh
        let triangleMeshes = [];
        let triangleCount = 100;

        // FPS计算
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsDisplay = document.getElementById('fps-display');

        function updateFPS() {
            const now = performance.now();
            frameCount++;
            if (now - lastTime >= 1000) {
                const fps = Math.round(frameCount * 1000 / (now - lastTime));
                fpsDisplay.textContent = `FPS: ${fps}`;
                frameCount = 0;
                lastTime = now;
            }
        }

        // 创建单个三角面片（作为一个独立的Three.js Mesh对象）
        function createSingleTriangle(index) {
            // 每个三角形3个顶点
            const centerX = (Math.random() - 0.5) * 10;
            const centerY = (Math.random() - 0.5) * 10;
            const centerZ = (Math.random() - 0.5) * 10;
            const size = 0.1 + Math.random() * 0.3;

            // 位置数据：3个顶点 * 3坐标 = 9个float
            const positions = new Float32Array([
                centerX + (Math.random() - 0.5) * size, centerY + (Math.random() - 0.5) * size, centerZ + (Math.random() - 0.5) * size,
                centerX + (Math.random() - 0.5) * size, centerY + (Math.random() - 0.5) * size, centerZ + (Math.random() - 0.5) * size,
                centerX + (Math.random() - 0.5) * size, centerY + (Math.random() - 0.5) * size, centerZ + (Math.random() - 0.5) * size
            ]);

            // 颜色数据：3个顶点 * 3颜色 = 9个float
            const colors = new Float32Array([
                Math.random(), Math.random(), Math.random(),
                Math.random(), Math.random(), Math.random(),
                Math.random(), Math.random(), Math.random()
            ]);

            // 创建BufferGeometry - 每个三角形独立
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // 创建Mesh - 每个三角形是一个独立的Mesh对象
            const material = createTriangleMaterial();
            const mesh = new THREE.Mesh(geometry, material);
            
            // 不使用索引，每个三角形独立drawCall
            return mesh;
        }

        // 创建所有三角面片（每个作为独立Mesh）
        function createTriangles(count) {
            // 移除旧的三角形
            for (const mesh of triangleMeshes) {
                scene.remove(mesh);
                mesh.geometry.dispose();
                mesh.material.dispose();
            }
            triangleMeshes = [];

            // 创建新的三角形，每个作为独立Mesh
            for (let i = 0; i < count; i++) {
                const mesh = createSingleTriangle(i);
                scene.add(mesh);
                triangleMeshes.push(mesh);
            }
        }

        // 初始创建
        createTriangles(triangleCount);

        // 鼠标控制相机旋转
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraRotation = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaMove = {
                    x: e.offsetX - previousMousePosition.x,
                    y: e.offsetY - previousMousePosition.y
                };

                cameraRotation.y += deltaMove.x * 0.01;
                cameraRotation.x += deltaMove.y * 0.01;

                camera.position.x = 5 * Math.sin(cameraRotation.y) * Math.cos(cameraRotation.x);
                camera.position.y = 5 * Math.sin(cameraRotation.x);
                camera.position.z = 5 * Math.cos(cameraRotation.y) * Math.cos(cameraRotation.x);
                camera.lookAt(0, 0, 0);
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.01;
            camera.position.z = Math.max(1, Math.min(20, camera.position.z));
            camera.lookAt(0, 0, 0);
        });

        // 应用按钮
        document.getElementById('apply-btn').addEventListener('click', () => {
            const input = document.getElementById('triangle-count');
            const value = parseInt(input.value);
            if (!isNaN(value) && value > 0) {
                triangleCount = value
                createTriangles(triangleCount);
            }
        });

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 动画循环 - 每个三角形独立渲染（独立drawCall）
        function animate(time) {
            requestAnimationFrame(animate);
            
            // 更新所有三角形的uniform
            for (const mesh of triangleMeshes) {
                mesh.material.uniforms.uTime.value = time * 0.001;
            }
            
            renderer.render(scene, camera);
            updateFPS();
        }

        animate(0);
    </script>
</body>
</html>
