<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 2: WASM 彩色三角面片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        canvas { display: block; }
        #controls {
            position: absolute; top: 10px; left: 10px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 100;
        }
        #controls label { display: block; margin-bottom: 5px; }
        #controls input { width: 150px; padding: 5px; margin-bottom: 10px; }
        #controls button { padding: 5px 15px; cursor: pointer; }
        #fps-display { margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="gl-canvas"></canvas>
    </div>
    <div id="controls">
        <label for="triangle-count">三角面片数量:</label>
        <input type="number" id="triangle-count" value="100" min="1">
        <button id="apply-btn">应用</button>
        <div id="fps-display">FPS: 0</div>
    </div>

    <script src="demo2_wasm.js"></script>
    <script>
        // UI 交互传递到 WASM
        Module.onRuntimeInitialized = function() {
            // 应用按钮：将三角面片数量传递给 WASM
            document.getElementById('apply-btn').addEventListener('click', function() {
                var input = document.getElementById('triangle-count');
                var value = parseInt(input.value);
                if (!isNaN(value) && value > 0) {
                    Module._update_triangle_count(value);
                }
            });

            // FPS 显示更新（由 WASM 渲染循环调用）
            window._updateFpsDisplay = function() {
                // FPS 已在 WASM 侧计算，这里只负责显示
                // 由于 emscripten_run_script 调用无法直接传值，
                // 我们在 WASM 中通过 Module._get_current_fps 获取
                var fps = Module._get_current_fps();
                document.getElementById('fps-display').textContent = 'FPS: ' + fps;
            };
        };
    </script>
</body>
</html>
